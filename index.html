<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高齡 30 秒椅子站立檢測 (防呆不崩潰版)</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; text-align: center; background-color: #f4f6f9; margin: 0; padding: 10px; }
        .input-group { margin: 15px auto; width: 90%; max-width: 400px; text-align: left; }
        label { font-weight: bold; color: #2c3e50; }
        input[type="text"] { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #bdc3c7; font-size: 18px; box-sizing: border-box; }
        
        .timer-box { font-size: 60px; color: #e67e22; font-weight: bold; margin-top: 5px; }
        .counter-box { font-size: 40px; color: #2c3e50; font-weight: bold; margin: 5px 0; }
        
        #debug-panel { 
            font-size: 20px; color: #c0392b; font-weight: bold; background: #fdebd0; 
            padding: 10px; border-radius: 10px; border: 3px dashed #e67e22; margin: 10px auto; width: 90%; max-width: 400px;
        }

        .status-box { font-size: 18px; color: #7f8c8d; font-weight: bold; height: 25px; margin-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%; }
        button { font-size: 20px; padding: 15px 0; width: 90%; max-width: 400px; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #init-btn { background-color: #e67e22; }
        #start-btn { background-color: #27ae60; }
        #start-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #canvas-container { margin: 0 auto; display: flex; justify-content: center; width: 100%; max-width: 480px; position: relative; }
        canvas { border-radius: 15px; background-color: #000; width: 100%; height: auto; }
        .flipped { transform: scaleX(-1); }
    </style>
</head>
<body>

    <div class="input-group">
        <label for="p-name">長者姓名：</label>
        <input type="text" id="p-name" placeholder="請輸入姓名">
    </div>

    <div class="timer-box" id="timer-display">30.0</div>
    <div class="counter-box">次數：<span id="count-display">0</span></div>
    
    <div id="debug-panel">等待相機啟動...</div>
    <div class="status-box" id="status-display">等待啟動...</div>

    <div class="btn-group">
        <button id="init-btn" onclick="init()">1. 點此開啟相機</button>
        <button id="start-btn" onclick="startTest()" disabled>2. 開始 30 秒測驗</button>
    </div>

    <button onclick="document.getElementById('canvas').classList.toggle('flipped')" style="background:#3498db; font-size:16px; padding:10px; margin-bottom:10px; color:white; border:none; border-radius:8px;">🪞 切換螢幕左右方向</button>

    <div id="canvas-container">
        <video id="native-video" playsinline autoplay muted style="position: absolute; width: 0; height: 0; visibility: hidden;"></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/m5xSQ1Ixr/";
        let model, ctx;
        let videoElement = document.getElementById('native-video');
        let canvas = document.getElementById("canvas");
        let count = 0;
        let isTesting = false; 
        let timerInterval = null;
        let hasStoodUp = false; 

        async function init() {
            document.getElementById("init-btn").innerText = "載入模型中...";
            document.getElementById("init-btn").disabled = true;

            try {
                model = await tmPose.load(URL + "model.json", URL + "metadata.json");
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" } 
                });
                videoElement.srcObject = stream;

                videoElement.onloadedmetadata = () => {
                    videoElement.play(); 
                    // 確保 canvas 取得相機真實尺寸
                    canvas.width = videoElement.videoWidth || 480; 
                    canvas.height = videoElement.videoHeight || 640;
                    ctx = canvas.getContext("2d");
                    
                    document.getElementById("init-btn").style.display = "none";
                    document.getElementById("start-btn").disabled = false;
                    document.getElementById("status-display").innerText = "準備就緒，輸入姓名後即可開始";
                    
                    window.requestAnimationFrame(loop);
                };
            } catch (error) {
                alert("相機開啟失敗！請檢查相機權限設定。");
                document.getElementById("init-btn").innerText = "重試開啟相機";
                document.getElementById("init-btn").disabled = false;
            }
        }

        async function startTest() {
            let name = document.getElementById("p-name").value;
            if(!name) {
                alert("請先輸入長者姓名再開始測驗！");
                return;
            }

            document.getElementById("start-btn").disabled = true;
            document.getElementById("p-name").disabled = true;
            count = 0;
            isTesting = true;
            hasStoodUp = false; 
            document.getElementById("count-display").innerText = "0";
            document.getElementById("status-display").innerText = "測驗進行中...";

            let startTime = Date.now();
            let duration = 30000; 

            if(timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                let passedTime = Date.now() - startTime;
                let timeLeft = Math.max(0, (duration - passedTime) / 1000);

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isTesting = false;
                    document.getElementById("timer-display").innerText = "0.0";
                    document.getElementById("status-display").innerText = `測驗結束！${name} 完成了 ${count} 次`;
                    document.getElementById("start-btn").disabled = false;
                    document.getElementById("p-name").disabled = false;
                    document.getElementById("start-btn").innerText = "重新測驗";
                } else {
                    document.getElementById("timer-display").innerText = timeLeft.toFixed(1);
                }
            }, 50);
        }

        // 加入 try...catch 保護，就算 AI 報錯也不會導致畫面凍結！
        async function loop() {
            try {
                if (videoElement.readyState >= 2) { 
                    await predict();
                }
            } catch (err) {
                console.error("AI 辨識發生小錯誤，已略過此影格:", err);
            }
            await new Promise(resolve => setTimeout(resolve, 0)); 
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // 第一步：不管三七二十一，先畫相機底圖！避免白畫面
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

            const { pose, posenetOutput } = await model.estimatePose(videoElement);

            // 第二步：確保有抓到骨架，才畫骨架和進行辨識 (防崩潰核心)
            if (pose && posenetOutput) {
                // 畫出骨架
                tmPose.drawKeypoints(pose.keypoints, 0.5, ctx, 6);
                tmPose.drawSkeleton(pose.keypoints, 0.5, ctx, 4);

                const prediction = await model.predict(posenetOutput);
                
                // 確保預測結果不為空
                if (prediction && prediction.length > 0) {
                    let bestPred = prediction.reduce((prev, current) => (prev.probability > current.probability) ? prev : current);
                    let aiName = bestPred.className; 
                    let aiScore = Math.round(bestPred.probability * 100);

                    let flagText = hasStoodUp ? "【已起身，待坐下】" : "【等待起身】";
                    document.getElementById("debug-panel").innerText = `AI 看到：${aiName} (${aiScore}%) \n 邏輯狀態：${flagText}`;

                    // --- 精準計數邏輯 ---
                    if (isTesting && bestPred.probability > 0.60) {
                        if (aiName === "站力") {
                            hasStoodUp = true; 
                        } 
                        else if (aiName === "坐下") {
                            if (hasStoodUp) {
                                count++;
                                document.getElementById("count-display").innerText = count;
                                hasStoodUp = false; 
                            }
                        }
                    }
                }
            } else {
                document.getElementById("debug-panel").innerText = "未偵測到完整人體骨架...";
            }
        }
    </script>
</body>
</html>
