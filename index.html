<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高齡 30 秒站立檢測 (除錯強化版)</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; text-align: center; background-color: #f4f6f9; margin: 0; padding: 10px; }
        .input-group { margin: 10px auto; width: 90%; max-width: 400px; text-align: left; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #bdc3c7; font-size: 16px; box-sizing: border-box; }
        .timer-box { font-size: 60px; color: #e67e22; font-weight: bold; }
        .counter-box { font-size: 40px; color: #2c3e50; font-weight: bold; margin: 5px 0; }
        
        /* 強化除錯面板：列出所有標籤機率 */
        #debug-panel { 
            font-size: 16px; color: #c0392b; text-align: left; background: #fff; 
            padding: 10px; border-radius: 10px; border: 2px solid #e67e22; margin: 10px auto; width: 90%; max-width: 400px;
            font-family: monospace;
        }

        .status-box { font-size: 18px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; }
        button { font-size: 20px; padding: 15px 0; width: 90%; max-width: 400px; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 5px 0; }
        #init-btn { background-color: #e67e22; }
        #start-btn { background-color: #27ae60; }
        #start-btn:disabled { background-color: #95a5a6; }
        canvas { border-radius: 15px; background-color: #000; width: 100%; max-width: 480px; height: auto; }
    </style>
</head>
<body>

    <div class="input-group">
        <label>長者姓名：</label>
        <input type="text" id="p-name" placeholder="請輸入姓名">
    </div>

    <div class="timer-box" id="timer-display">30.0</div>
    <div class="counter-box">次數：<span id="count-display">0</span></div>
    
    <div id="debug-panel">等待數據...</div>
    <div class="status-box" id="status-display">等待啟動...</div>

    <button id="init-btn" onclick="init()">1. 開啟相機</button>
    <button id="start-btn" onclick="startTest()" disabled>2. 開始測驗</button>

    <div id="canvas-container">
        <video id="native-video" playsinline autoplay muted style="display:none;"></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/m5xSQ1Ixr/";
        let model, ctx, videoElement, canvas;
        let count = 0, isTesting = false, hasStoodUp = false;
        let timerInterval = null;

        async function init() {
            videoElement = document.getElementById('native-video');
            canvas = document.getElementById("canvas");
            document.getElementById("init-btn").innerText = "模型載入中...";
            
            try {
                model = await tmPose.load(URL + "model.json", URL + "metadata.json");
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    canvas.width = videoElement.videoWidth;
                    canvas.height = videoElement.videoHeight;
                    ctx = canvas.getContext("2d");
                    document.getElementById("init-btn").style.display = "none";
                    document.getElementById("start-btn").disabled = false;
                    document.getElementById("status-display").innerText = "準備就緒";
                    window.requestAnimationFrame(loop);
                };
            } catch (e) { alert("無法開啟相機"); }
        }

        async function startTest() {
            if(!document.getElementById("p-name").value) return alert("請輸入姓名");
            count = 0; isTesting = true; hasStoodUp = false;
            document.getElementById("count-display").innerText = "0";
            let timeLeft = 30.0;
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById("timer-display").innerText = timeLeft.toFixed(1);
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isTesting = false;
                    document.getElementById("status-display").innerText = "測驗完成！";
                    document.getElementById("start-btn").disabled = false;
                }
            }, 100);
            document.getElementById("start-btn").disabled = true;
        }

        async function loop() {
            if (videoElement.readyState >= 2) await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(videoElement);
            ctx.drawImage(videoElement, 0, 0);
            if (pose) {
                tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
                tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);

                const prediction = await model.predict(posenetOutput);
                
                // 找出各個標籤的分數
                let sitScore = 0, standScore = 0, emptyScore = 0;
                let debugText = "【即時機率監控】<br>";
                
                prediction.forEach(p => {
                    let prob = (p.probability * 100).toFixed(0);
                    debugText += `${p.className}: ${prob}%<br>`;
                    if(p.className.includes("坐")) sitScore = p.probability;
                    if(p.className.includes("站")) standScore = p.probability;
                });

                document.getElementById("debug-panel").innerHTML = debugText + `邏輯狀態：${hasStoodUp ? "已起身" : "待起身"}`;

                // --- 調整後的判定邏輯 ---
                if (isTesting) {
                    // 1. 判定「站立」：信心值必須超過 85%
                    if (standScore > 0.85) {
                        hasStoodUp = true;
                    } 
                    // 2. 判定「坐下」：信心值必須超過 85%，且之前必須有站起來過
                    else if (sitScore > 0.85 && hasStoodUp) {
                        count++;
                        document.getElementById("count-display").innerText = count;
                        hasStoodUp = false; // 重置，等待下一次起身
                    }
                }
            }
        }
    </script>
</body>
</html>
