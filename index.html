<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高齡 30 秒椅子站立檢測 (正方形比例校正版)</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; text-align: center; background-color: #f4f6f9; margin: 0; padding: 10px; }
        .timer-box { font-size: 60px; color: #e67e22; font-weight: bold; margin-top: 5px; }
        .counter-box { font-size: 40px; color: #2c3e50; font-weight: bold; margin: 5px 0; }
        
        #debug-panel { 
            font-size: 22px; color: #c0392b; font-weight: bold; background: #fdebd0; 
            padding: 10px; border-radius: 10px; border: 3px dashed #e67e22; margin: 10px auto; width: 90%; max-width: 400px;
        }

        .status-box { font-size: 18px; color: #7f8c8d; font-weight: bold; height: 25px; margin-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%; }
        button { font-size: 20px; padding: 15px 0; width: 90%; max-width: 400px; color: white; border: none; border-radius: 12px; font-weight: bold; }
        #init-btn { background-color: #e67e22; }
        #start-btn { background-color: #27ae60; }
        #start-btn:disabled { background-color: #95a5a6; }
        
        /* 🔥 將容器強制設定為正方形，讓你看見 AI 眼中的真實世界 🔥 */
        #canvas-container { margin: 0 auto; display: flex; justify-content: center; width: 100%; max-width: 400px; position: relative; }
        canvas { border-radius: 15px; background-color: #000; width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .flipped { transform: scaleX(-1); }
    </style>
</head>
<body>

    <div class="timer-box" id="timer-display">30.0</div>
    <div class="counter-box">次數：<span id="count-display">0</span></div>
    
    <div id="debug-panel">等待相機啟動...</div>
    <div class="status-box" id="status-display">等待啟動...</div>

    <div class="btn-group">
        <button id="init-btn" onclick="init()">1. 點此開啟相機</button>
        <button id="start-btn" onclick="startTest()" disabled>2. 開始 30 秒測驗</button>
    </div>

    <button onclick="document.getElementById('canvas').classList.toggle('flipped')" style="background:#3498db; font-size:16px; padding:10px; margin-bottom:10px; color:white; border:none; border-radius:8px;">🪞 切換螢幕左右方向</button>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/m5xSQ1Ixr/";
        let model, webcam, ctx;
        let count = 0;
        let currentState = "None"; 
        let isTesting = false; 
        let timeLeft = 30.0;
        let timerInterval = null;

        async function init() {
            document.getElementById("init-btn").innerText = "載入中...";
            document.getElementById("init-btn").disabled = true;

            try {
                model = await tmPose.load(URL + "model.json", URL + "metadata.json");
                
                // 🔥 核心修正：將相機底層解析度改為標準的正方形 400x400 🔥
                webcam = new tmPose.Webcam(400, 400, false); 
                await webcam.setup({ facingMode: "environment" }); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                const canvas = document.getElementById("canvas");
                canvas.width = 400; 
                canvas.height = 400;
                ctx = canvas.getContext("2d");

                document.getElementById("init-btn").style.display = "none";
                document.getElementById("start-btn").disabled = false;
                document.getElementById("status-display").innerText = "相機已啟動！";

            } catch (error) {
                alert("相機開啟失敗！");
                document.getElementById("init-btn").innerText = "重試開啟相機";
                document.getElementById("init-btn").disabled = false;
            }
        }

        async function startTest() {
            document.getElementById("start-btn").disabled = true;
            count = 0;
            timeLeft = 30.0;
            isTesting = true;
            currentState = "Sit"; 
            document.getElementById("count-display").innerText = "0";
            document.getElementById("status-display").innerText = "測驗進行中...";

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isTesting = false;
                    document.getElementById("timer-display").innerText = "0.0";
                    document.getElementById("status-display").innerText = "測驗結束！";
                    document.getElementById("start-btn").disabled = false;
                    document.getElementById("start-btn").innerText = "重新測驗";
                } else {
                    document.getElementById("timer-display").innerText = timeLeft.toFixed(1);
                }
            }, 100);
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let bestPred = prediction.reduce((prev, current) => (prev.probability > current.probability) ? prev : current);
            let aiName = bestPred.className;
            let aiScore = Math.round(bestPred.probability * 100);

            document.getElementById("debug-panel").innerText = `AI 看到：【 ${aiName} 】 (${aiScore}%)`;

            let nameLower = aiName.toLowerCase();

            // 門檻設定為 60%
            if (bestPred.probability > 0.60) {
                if (nameLower.includes("stand") || nameLower.includes("站") || nameLower.includes("起") || nameLower.includes("1")) {
                    currentState = "Stand";
                } 
                else if (nameLower.includes("sit") || nameLower.includes("坐") || nameLower.includes("2")) {
                    if (currentState === "Stand" && isTesting) {
                        count++;
                        document.getElementById("count-display").innerText = count;
                    }
                    currentState = "Sit"; 
                }
            }

            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    tmPose.drawKeypoints(pose.keypoints, 0.5, ctx, 6);
                    tmPose.drawSkeleton(pose.keypoints, 0.5, ctx, 4);
                }
            }
        }
    </script>
</body>
</html>
