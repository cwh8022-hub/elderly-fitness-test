<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30秒椅子站立測試 (原始邏輯版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #canvas-container { margin: 20px auto; width: 100%; max-width: 400px; }
        canvas { width: 100%; border: 1px solid #ccc; border-radius: 10px; }
        button { font-size: 20px; padding: 15px; width: 80%; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>次數：<span id="count-display">0</span></h1>
    <h2 id="timer-display">30.0</h2>
    <p id="status-display">等待啟動...</p>

    <button onclick="init()">1. 開啟相機</button>
    <button id="start-btn" onclick="startTest()" disabled>2. 開始測驗</button>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/m5xSQ1Ixr/";
        let model, webcam, ctx;
        let count = 0;
        let currentState = "None"; 
        let isTesting = false; 
        let timeLeft = 30.0;

        async function init() {
            try {
                model = await tmPose.load(URL + "model.json", URL + "metadata.json");
                webcam = new tmPose.Webcam(400, 400, true); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);
                
                const canvas = document.getElementById("canvas");
                canvas.width = 400; canvas.height = 400;
                ctx = canvas.getContext("2d");
                
                document.getElementById("start-btn").disabled = false;
                document.getElementById("status-display").innerText = "準備就緒";
            } catch (e) { alert("啟動失敗"); }
        }

        function startTest() {
            count = 0;
            timeLeft = 30.0;
            isTesting = true;
            document.getElementById("count-display").innerText = "0";
            
            let timer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById("timer-display").innerText = timeLeft.toFixed(1);
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    isTesting = false;
                    alert("測驗結束，總計：" + count + " 次");
                }
            }, 100);
        }

        async function loop() {
            webcam.update();
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let best = prediction.reduce((prev, curr) => (prev.probability > curr.probability) ? prev : curr);

            if (best.probability > 0.8) {
                if (best.className.includes("Stand") || best.className.includes("站")) {
                    currentState = "Stand";
                } else if (best.className.includes("Sit") || best.className.includes("坐")) {
                    if (isTesting && currentState === "Stand") {
                        count++;
                        document.getElementById("count-display").innerText = count;
                    }
                    currentState = "Sit";
                }
            }

            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
                tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
            }
            window.requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
